<ion-header>
  <ion-toolbar style=" --background:#4e148c;">
    <ion-title style="color: white;">Cart</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>

  <div *ngFor="let group of cartGroups">

    <!-- Course Type Header -->
    <h3 style="margin:10px 0; font-weight:bold;">
      {{ group.courseType }}
    </h3>

    <!-- Levels -->
    <ion-item *ngFor="let item of group.courseLevels">

      <ion-label>
        <h2>{{ item.courseLevel }}</h2>
        <p>₹ {{ item.courseLevelPrice }}</p>
      </ion-label>

      <ion-button fill="clear" color="danger"
        (click)="removeCartItem(item.cartId)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>

    </ion-item>

  </div>

</ion-list>

  <ion-item>
    <ion-label><b>Total Amount:</b></ion-label>
    <ion-text>₹ {{ totalAmount }}/-</ion-text>
  </ion-item>

  <ion-footer class="ion-padding">
    <ion-button  (click)="continueShopping()">
      Continue to Purchase
    </ion-button>
    <ion-button (click)="checkout()">
      Checkout
    </ion-button>
  </ion-footer>
</ion-content>
