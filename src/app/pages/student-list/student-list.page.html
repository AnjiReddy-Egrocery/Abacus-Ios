<ion-content>

  <div class="title">Students List</div>

  <div class="card" *ngFor="let student of studentList">

   <img 
      [src]="getImage(student.profilePic)" 
      (error)="onImageError($event)">


    <h3>{{ student.firstName }} {{ student.lastName }}</h3>

    <button (click)="goToDashboard(student)">
      Go to Dashboard
    </button>

  </div>

</ion-content>
